<script>
'use strict';
/* ============================================================
   component-toast.html — v5.0.0
   Sistema de notificaciones Toast (éxito, error, warning, info).
   Animado, auto-dismiss, stackable, accesible.
   Se registra en window.App.Toast
   ============================================================ */

// --- SECCIÓN 0: CLASE ToastManager ---

class ToastManager {

  #container = null;
  #defaultDuration = 4000;  // ms

  constructor() {
    this.#mount();
    App.log('ToastManager', 'constructor', 'Toast manager listo');
  }

  // --- SECCIÓN 1: API PÚBLICA ---

  /**
   * Muestra un toast de éxito.
   * @param {string} mensaje
   * @param {number} [duration]
   */
  success(mensaje, duration = this.#defaultDuration) {
    this.#show('success', mensaje, duration);
  }

  /**
   * Muestra un toast de error.
   * @param {string} mensaje
   * @param {number} [duration]
   */
  error(mensaje, duration = this.#defaultDuration + 2000) {
    this.#show('error', mensaje, duration);
  }

  /**
   * Muestra un toast de advertencia.
   * @param {string} mensaje
   * @param {number} [duration]
   */
  warning(mensaje, duration = this.#defaultDuration) {
    this.#show('warning', mensaje, duration);
  }

  /**
   * Muestra un toast informativo.
   * @param {string} mensaje
   * @param {number} [duration]
   */
  info(mensaje, duration = this.#defaultDuration) {
    this.#show('info', mensaje, duration);
  }

  // --- SECCIÓN 2: PRIVADOS ---

  /** Crea e inyecta el contenedor de toasts en el DOM */
  #mount() {
    if (document.getElementById('toast-container')) return;
    const container = document.createElement('div');
    container.id = 'toast-container';
    container.setAttribute('role', 'region');
    container.setAttribute('aria-label', 'Notificaciones');
    container.setAttribute('aria-live', 'polite');
    document.body.appendChild(container);
    this.#container = container;
  }

  /**
   * Crea y muestra un toast.
   * @param {'success'|'error'|'warning'|'info'} tipo
   * @param {string} mensaje
   * @param {number} duration
   */
  #show(tipo, mensaje, duration) {
    const iconMap = {
      success : 'success',
      error   : 'error',
      warning : 'warning',
      info    : 'info'
    };

    const toast = document.createElement('div');
    toast.className = `toast toast-${tipo}`;
    toast.setAttribute('role', tipo === 'error' ? 'alert' : 'status');
    toast.innerHTML = `
      <span class="toast-icon">${App.Icons.get(iconMap[tipo], 'icon-sm')}</span>
      <span class="toast-msg">${App.Utils.escapeHtml(mensaje)}</span>
      <button class="toast-close" aria-label="Cerrar notificación">
        ${App.Icons.get('close', 'icon-sm')}
      </button>
    `;

    // Cerrar al click
    toast.querySelector('.toast-close').addEventListener('click', () => {
      this.#dismiss(toast);
    });

    this.#container.appendChild(toast);

    // Forzar reflow para activar la animación de entrada
    toast.getBoundingClientRect();
    toast.classList.add('toast-visible');

    // Auto-dismiss
    const timer = setTimeout(() => this.#dismiss(toast), duration);

    // Pausar al hover
    toast.addEventListener('mouseenter', () => clearTimeout(timer));
    toast.addEventListener('mouseleave', () => {
      setTimeout(() => this.#dismiss(toast), 1500);
    });

    App.log('ToastManager', '#show', `[${tipo}] ${mensaje}`);
  }

  /**
   * Anima la salida y remueve el toast del DOM.
   * @param {HTMLElement} toast
   */
  #dismiss(toast) {
    if (!toast || toast.classList.contains('toast-leaving')) return;
    toast.classList.add('toast-leaving');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
    // Fallback por si animationend no se dispara
    setTimeout(() => toast.remove(), 400);
  }
}

// --- REGISTRO EN NAMESPACE ---
App.Toast = new ToastManager();
App.log('component-toast', 'init', 'App.Toast registrado');
</script>

<style>
/* ============================================================
   Toast styles — inlined para carga inmediata
   ============================================================ */

#toast-container {
  position   : fixed;
  bottom     : var(--space-6, 1.5rem);
  right      : var(--space-6, 1.5rem);
  z-index    : var(--z-toast, 9000);
  display    : flex;
  flex-direction : column-reverse;
  gap        : var(--space-3, 0.75rem);
  max-width  : 420px;
  pointer-events : none;
}

.toast {
  display         : flex;
  align-items     : center;
  gap             : var(--space-3, 0.75rem);
  padding         : var(--space-3, 0.75rem) var(--space-4, 1rem);
  border-radius   : var(--radius-lg, 0.75rem);
  box-shadow      : var(--shadow-lg, 0 8px 24px rgba(0,0,0,.18));
  font-size       : var(--text-sm, 0.875rem);
  font-weight     : 500;
  line-height     : 1.4;
  pointer-events  : all;
  opacity         : 0;
  transform       : translateX(110%);
  transition      : none;
  backdrop-filter : blur(8px);
}

.toast-visible {
  animation : toast-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.toast-leaving {
  animation : toast-out 0.25s ease-in forwards;
}

@keyframes toast-in {
  from { opacity: 0; transform: translateX(110%); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes toast-out {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(110%); }
}

.toast-success { background: var(--color-success-bg, #ecfdf5); color: var(--color-success, #059669); border-left: 3px solid var(--color-success, #059669); }
.toast-error   { background: var(--color-error-bg,   #fef2f2); color: var(--color-error,   #dc2626); border-left: 3px solid var(--color-error,   #dc2626); }
.toast-warning { background: var(--color-warning-bg, #fffbeb); color: var(--color-warning, #d97706); border-left: 3px solid var(--color-warning, #d97706); }
.toast-info    { background: var(--color-info-bg,    #eff6ff); color: var(--color-info,    #2563eb); border-left: 3px solid var(--color-info,    #2563eb); }

.toast-icon { flex-shrink: 0; }
.toast-msg  { flex: 1; }

.toast-close {
  flex-shrink   : 0;
  background    : transparent;
  border        : none;
  cursor        : pointer;
  padding       : 2px;
  border-radius : var(--radius-sm, 4px);
  color         : inherit;
  opacity       : 0.6;
  transition    : opacity 0.15s;
  display       : flex;
  align-items   : center;
}
.toast-close:hover { opacity: 1; }
</style>
