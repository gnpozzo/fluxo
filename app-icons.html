  // --- SECCIÓN 1: API PÚBLICA ---

  /**
   * Devuelve el HTML del icono solicitado.
   * @param {string} name   Clave del catálogo
   * @param {string} [size='icon-md']  Clase CSS de tamaño (icon-sm | icon-md | icon-lg)
   * @param {string} [extraClass='']  Clases CSS adicionales
   * @returns {string}  HTML del SVG envuelto en <span class="icon ...">
   */
  get(name, size = 'icon-md', extraClass = '') {
    const svg = this.#catalog[name];
    if (!svg) {
      App.warn('IconRegistry', 'get', `Icono desconocido: "${name}"`);
      return '';
    }
    const classes = ['icon', size, extraClass].filter(Boolean).join(' ');
    return `<span class="${classes}" aria-hidden="true">${svg}</span>`;
  }

  /**
   * Verifica si un icono existe en el catálogo.
   * @param {string} name
   */
  has(name) {
    return name in this.#catalog;
  }

  /**
   * Lista todas las claves disponibles.
   * @returns {string[]}
   */
  list() {
    return Object.keys(this.#catalog);
  }
}

// --- REGISTRO EN NAMESPACE ---

App.log('app-icons', 'init', `App.Icons registrado — ${App.Icons.list().length} iconos`);
