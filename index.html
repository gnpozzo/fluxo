<!DOCTYPE html>

    <!-- ── Loader overlay ──────────────────────────────────────── -->
    <div id="loader-overlay" class="loader-overlay hidden">
      <div class="loader-spinner"></div>
      <p>Cargando...</p>
    </div>

    <!-- ── Login overlay ──────────────────────────────────────── -->
    <div id="login-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:var(--fondo);z-index:9999;display:none;align-items:center;justify-content:center;">
      <div style="background:var(--superficie);padding:40px;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.1);max-width:400px;width:90%;">
        <div style="text-align:center;margin-bottom:30px;">
           <img src="https://i.imgur.com/FLSwshY.png" alt="Fluxo" style="width:180px;height:auto;">
           <p style="color:var(--texto-2);margin-top:10px;">Inicia sesión para continuar</p>
        </div>
        <form id="form-login" onsubmit="event.preventDefault()">
          <div style="margin-bottom:20px;">
            <label style="display:block;margin-bottom:8px;color:var(--texto-2);font-size:0.9rem;">Email</label>
            <input type="email" id="login-email" required style="width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;background:var(--fondo);color:var(--texto);">
          </div>
          <div style="margin-bottom:30px;">
            <label style="display:block;margin-bottom:8px;color:var(--texto-2);font-size:0.9rem;">Contraseña</label>
            <input type="password" id="login-password" required style="width:100%;padding:12px;border:1px solid var(--borde);border-radius:8px;background:var(--fondo);color:var(--texto);">
          </div>
          <div style="display:flex;gap:12px;margin-bottom:16px;">
            <button type="submit" id="btn-login-submit" class="btn btn-primary" style="flex:1;padding:12px;border-radius:8px;font-weight:600;display:flex;justify-content:center;align-items:center;gap:8px;">
              Ingresar
            </button>
            <button type="button" id="btn-register-submit" class="btn btn-outline" style="flex:1;padding:12px;border-radius:8px;font-weight:600;display:flex;justify-content:center;align-items:center;gap:8px;">
              Crear Cuenta
            </button>
          </div>
          
          <div style="display:flex;align-items:center;text-align:center;color:var(--texto-2);margin: 20px 0;font-size:0.85rem;">
            <div style="flex:1;height:1px;background:var(--borde);"></div>
            <span style="padding:0 10px;">o continuar con</span>
            <div style="flex:1;height:1px;background:var(--borde);"></div>
          </div>
          
          <button type="button" id="btn-google-login" style="width:100%;padding:12px;border-radius:8px;font-weight:600;display:flex;justify-content:center;align-items:center;gap:10px;background:var(--fondo);color:var(--texto);border:1px solid var(--borde);cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='var(--hover)'" onmouseout="this.style.background='var(--fondo)'">
            <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
        </form>

    <!-- Script de tema (independiente, no necesita App.*) -->
    <script>
    'use strict';
    (function() {
      const THEME_KEY = 'app_theme';
      const btn       = document.getElementById('btn-theme-toggle');
      const saved     = sessionStorage.getItem(THEME_KEY) || 'light';
      document.documentElement.setAttribute('data-theme', saved);

      // Actualizar ícono del botón según tema activo
      function updateThemeIcon(theme) {
        const iconPath = btn?.querySelector('path');
        if (!iconPath) return;
        if (theme === 'dark') {
          // Ícono sol para dark mode (click → volver a light)
          iconPath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z');
        } else {
          // Ícono luna para light mode (click → ir a dark)
          iconPath.setAttribute('d', 'M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z');
        }
      }

      updateThemeIcon(saved);

      btn?.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next    = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        sessionStorage.setItem(THEME_KEY, next);
        updateThemeIcon(next);
      });

      // --- Sidebar toggle for mobile ---
      const sidebarToggle = document.getElementById('sidebar-toggle');
      const sidebar = document.getElementById('app-sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      
      function closeSidebar() {
        sidebar?.classList.remove('sidebar-open');
        backdrop?.classList.remove('open');
      }

      sidebarToggle?.addEventListener('click', () => {
        sidebar?.classList.toggle('sidebar-open');
        backdrop?.classList.toggle('open');
      });

      backdrop?.addEventListener('click', closeSidebar);

      // --- Gemini panel toggle ---
      const btnGemini = document.getElementById('btn-gemini');
      const geminiPanel = document.getElementById('gemini-panel');
      const geminiOverlay = document.getElementById('gemini-overlay');
      const geminiClose = document.getElementById('gemini-panel-close');

      function openGemini() {
        geminiPanel?.classList.add('open');
        geminiOverlay?.classList.add('open');
      }

      function closeGemini() {
        geminiPanel?.classList.remove('open');
        geminiOverlay?.classList.remove('open');
      }

      btnGemini?.addEventListener('click', openGemini);
      geminiClose?.addEventListener('click', closeGemini);
      geminiOverlay?.addEventListener('click', closeGemini);

      // --- Config header button (same as sidebar Ajustes) ---
      document.getElementById('btn-admin-header')?.addEventListener('click', () => {
        document.getElementById('btn-admin')?.click();
      });
    })();
    </script>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
